changeType: resource-renamed
category: resources
version: 1.0.0
introduced: 0.5.0
rulesFile: rules/breaking-changes.yaml
title: Resource Renamed
description: |
  Detects when a resource's name changes. Renaming is breaking because it
  affects discoverability and client code.

variants:
  - id: resource-renamed-breaking
    breaking: true
    severity: major
    message: Renaming a resource breaks clients using the old name
    rationale: |
      Old clients request the old resource name and won't find it.
      Resource names are used in client code and documentation.
    migration: |
      To rename a resource safely:
      1. Add new resource with new name (same URI/content)
      2. Keep old name as alias
      3. Deprecate old name for at least one major version
      4. Document the rename
      5. Remove old name in next major version
    examples:
      pass:
        - name: Resource renamed
          description: Renaming a resource is breaking
          change:
            id: 550e8400-e29b-41d4-a716-446655442003
            category: resources
            changeType: resource-renamed
            path: resources[file://data/config.json].name
            description: "Resource renamed from 'Config' to 'Configuration'"
            from: { name: Config }
            to: { name: Configuration }
          expectedResult:
            breaking: true
            severity: major
            matchesThisVariant: true
      fail: []

relatedRules:
  - resource-uri-changed
  - tool-renamed

tags:
  - resources
  - naming
  - breaking-changes
