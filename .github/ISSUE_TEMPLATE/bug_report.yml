---
name: Bug Report
description: Report a bug to help us improve.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Please provide a description of the problem
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: Please describe what you expected would happen
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Affected Version
      description: |
        Output of `mcpcontract --version`, or the git commit / tag where the
        issue was encountered.
      placeholder: "e.g. 0.29.2"
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js Version
      description: Output of `node --version`.
      placeholder: "e.g. v20.11.0"
    validations:
      required: false
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows
        - WSL
        - Other
    validations:
      required: false
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Please provide all steps to reproduce the behavior
      placeholder: |
        1. In this environment...
        2. With this config...
        3. Run `this command`...
        4. See error...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: |
        Paste any error output, stack traces, or relevant log snippets.
        Will be automatically formatted as code.
      render: shell
    validations:
      required: false
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      description: By submitting this issue, you agree to the following
      options:
        - label: I have read the [contributing guidelines](https://github.com/cisco-open/mcptoolkit-contract/blob/main/CONTRIBUTING.md)
          required: true
        - label: I have verified this does not duplicate an existing issue
          required: true
